<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const INITIAL_CAPITAL = 1000;

const INSTRUMENT_META = {
XAUUSD: { emoji: “🥇”, type: “Matiere premiere”, base: 2350 },
BTC: { emoji: “₿”, type: “Crypto Halal”, base: 62000 },
NVDA: { emoji: “💻”, type: “Action Tech”, base: 135 },
MSFT: { emoji: “🖥️”, type: “Action Tech”, base: 440 },
AAPL: { emoji: “📱”, type: “Action Tech”, base: 195 },
TSLA: { emoji: “🚗”, type: “Action Tech”, base: 250 },
AMZN: { emoji: “📦”, type: “Action Tech”, base: 185 },
GOOGL: { emoji: “🔍”, type: “Action Tech”, base: 175 },
LLY: { emoji: “💊”, type: “Action Pharma”, base: 780 },
ASML: { emoji: “🔬”, type: “Action Tech”, base: 950 },
};

const SYMBOLS = Object.keys(INSTRUMENT_META);

function randomSignal() {
const r = Math.random();
if (r < 0.4) return “ACHETER”;
if (r < 0.8) return “VENDRE”;
return “ATTENDRE”;
}

function randomPct() {
return +(Math.random() * 3 + 0.3).toFixed(2);
}

const Badge = ({ signal }) => {
const map = {
ACHETER: [”#16a34a”, “▲ ACHETER”],
VENDRE: [”#dc2626”, “▼ VENDRE”],
ATTENDRE: [”#d97706”, “◆ ATTENDRE”],
};
const [bg, label] = map[signal] || map.ATTENDRE;
return (
<span style={{ background: bg, color: “white”, fontSize: 10, fontWeight: 700, padding: “3px 8px”, borderRadius: 6 }}>
{label}
</span>
);
};

function App() {
const [capital, setCapital] = useState(INITIAL_CAPITAL);
const [trades, setTrades] = useState([]);
const [signals, setSignals] = useState(() =>
SYMBOLS.map((sym) => ({ symbol: sym, signal: randomSignal(), pct: randomPct() }))
);

useEffect(() => {
const interval = setInterval(() => {
setSignals(SYMBOLS.map((sym) => ({ symbol: sym, signal: randomSignal(), pct: randomPct() })));
}, 8000);
return () => clearInterval(interval);
}, []);

const executeTrade = (symbol, signal, pct) => {
if (signal === “ATTENDRE”) return;
const stake = +(capital * 0.05).toFixed(2);
const win = Math.random() < 0.55;
const gain = win ? +(stake * (pct / 100)).toFixed(2) : -+(stake * (pct / 100) * 0.6).toFixed(2);
const newTrade = {
id: Date.now(),
symbol,
signal,
pct,
stake,
gain,
result: win ? “WIN” : “LOSS”,
time: new Date().toLocaleTimeString(“fr-FR”),
};
setTrades((prev) => [newTrade, …prev].slice(0, 30));
setCapital((prev) => +(prev + gain).toFixed(2));
};

const resetCapital = () => {
setCapital(INITIAL_CAPITAL);
setTrades([]);
};

const totalGain = +(capital - INITIAL_CAPITAL).toFixed(2);
const gainPct = +((totalGain / INITIAL_CAPITAL) * 100).toFixed(2);

return (
<div style={{ maxWidth: 480, margin: “0 auto”, padding: 16, paddingBottom: 40 }}>
<div style={{ textAlign: “center”, marginBottom: 20 }}>
<div style={{ fontSize: 20, fontWeight: 800 }}>🕌 HalalBot</div>
<div style={{ fontSize: 11, color: “#64748b” }}>Paper Trading — Capital fictif</div>
</div>
