<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HalalBot - Paper Trading Reel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080d1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const INITIAL_CAPITAL = 1000;

const INSTRUMENT_META = {
  XAUUSD: { emoji: "🥇", type: "Matiere premiere" },
  BTC: { emoji: "₿", type: "Crypto Halal" },
  NVDA: { emoji: "💻", type: "Action Tech" },
  MSFT: { emoji: "🖥️", type: "Action Tech" },
  AAPL: { emoji: "📱", type: "Action Tech" },
};

const Badge = ({ signal }) => {
  const map = { ACHETER: ["#16a34a", "▲ ACHETER"], VENDRE: ["#dc2626", "▼ VENDRE"], ATTENDRE: ["#d97706", "◆ ATTENDRE"] };
  const [bg, label] = map[signal] || map.ATTENDRE;
  return <span style={{ background: bg, color: "white", fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 20, whiteSpace: "nowrap" }}>{label}</span>;
};

const Card = ({ label, value, color }) => (
  <div style={{ background: "#0f172a", borderRadius: 10, padding: "10px 8px", textAlign: "center", border: "1px solid #1e3a5f" }}>
    <div style={{ fontSize: 9, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
    <div style={{ fontSize: 14, fontWeight: 800, color }}>{value}</div>
  </div>
);

function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("marches");
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const fetchData = () => {
    fetch("./data/state.json?t=" + Date.now())
      .then(res => {
        if (!res.ok) throw new Error("Pas encore de donnees");
        return res.json();
      })
      .then(data => { setState(data); setLoading(false); setError(null); })
      .catch(err => { setError(err.message); setLoading(false); });
  };

  useEffect(() => {
    fetchData();
    const interval = setInterval(fetchData, 60000);
    return () => clearInterval(interval);
  }, []);

  const fmt = (id, price) => {
    if (price == null) return "—";
    if (id === "BTC" || id === "XAUUSD") return `$${price.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
    return `$${price}`;
  };

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b" }}>
        Chargement des donnees...
      </div>
    );
  }

  if (error || !state) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#64748b", padding: 20, textAlign: "center" }}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>🤖</div>
        <div style={{ marginBottom: 8 }}>Le bot n'a pas encore tourne une premiere fois.</div>
        <div style={{ fontSize: 12, color: "#475569" }}>Lance le workflow GitHub Actions manuellement ou attends le prochain cycle de 30 minutes.</div>
      </div>
    );
  }

  const positions = state.positions || [];
  const trades = state.trades || [];
  const signals = state.signals || {};
  const capital = state.capital ?? INITIAL_CAPITAL;

  const totalValue = capital + positions.reduce((sum, p) => {
    const cur = signals[p.symbol]?.price ?? p.entry_price;
    return sum + p.amount + (cur - p.entry_price) * p.qty;
  }, 0);
  const pnl = +(totalValue - INITIAL_CAPITAL).toFixed(2);
  const pct = +((pnl / INITIAL_CAPITAL) * 100).toFixed(2);
  const wins = trades.filter(t => t.result === "WIN").length;
  const winRate = trades.length ? +((wins / trades.length) * 100).toFixed(1) : 0;
  const totalGain = +trades.reduce((s, t) => s + t.gain, 0).toFixed(2);

  return (
    <div style={{ fontFamily: "Inter, sans-serif", background: "#080d1a", minHeight: "100vh", paddingBottom: 40 }}>
      <div style={{ background: "linear-gradient(135deg,#0f172a,#1a1f3e)", borderBottom: "1px solid #1e3a5f", padding: "14px 16px" }}>
        <div style={{ maxWidth: 800, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 22 }}>🌙</span>
              <span style={{ fontSize: 20, fontWeight: 800, color: "#c9a84c" }}>HalalBot</span>
              <span style={{ fontSize: 10, background: "#1e3a5f", color: "#60a5fa", padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>DONNEES REELLES</span>
            </div>
            <div style={{ fontSize: 11, color: "#475569", marginTop: 2 }}>
              {state.last_update ? `Mis a jour: ${new Date(state.last_update).toLocaleString("fr-FR")}` : "Jamais mis a jour"}
            </div>
          </div>
        </div>
        {state.has_news_warning && (
          <div style={{ maxWidth: 800, margin: "10px auto 0", background: "#451a03", border: "1px solid #d97706", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#fbbf24" }}>
            ⚠️ News a fort impact detectee — Le bot n'ouvre pas de nouvelles positions : {state.news_event}
          </div>
        )}
      </div>

      <div style={{ maxWidth: 800, margin: "0 auto", padding: "16px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 8 }}>
          <Card label="Capital" value={`${capital.toFixed(0)}€`} color="#60a5fa" />
          <Card label="Total" value={`${totalValue.toFixed(0)}€`} color="#c9a84c" />
          <Card label="P&L" value={`${pnl >= 0 ? "+" : ""}${pnl}€`} color={pnl >= 0 ? "#34d399" : "#f87171"} />
          <Card label="Perf." value={`${pct >= 0 ? "+" : ""}${pct}%`} color={pct >= 0 ? "#34d399" : "#f87171"} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 14 }}>
          <Card label="Trades" value={trades.length} color="#e2e8f0" />
          <Card label="Win Rate" value={`${winRate}%`} color="#e2e8f0" />
          <Card label="Gain net" value={`${totalGain >= 0 ? "+" : ""}${totalGain}€`} color={totalGain >= 0 ? "#34d399" : "#f87171"} />
          <Card label="Positions" value={positions.length} color="#e2e8f0" />
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {[["marches","Marches"],["positions",`Positions (${positions.length})`],["historique",`Historique (${trades.length})`]].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)} style={{ background: tab === key ? "#1e3a5f" : "#0f172a", color: tab === key ? "#60a5fa" : "#475569", border: `1px solid ${tab === key ? "#3b82f6" : "#1e3a5f"}`, borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{label}</button>
          ))}
        </div>

        {tab === "marches" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {Object.keys(INSTRUMENT_META).map(id => {
              const sig = signals[id];
              const meta = INSTRUMENT_META[id];
              const isOpen = positions.find(p => p.symbol === id);
              return (
                <div key={id} style={{ background: "#0f172a", borderRadius: 12, padding: "14px 16px", border: `1px solid ${isOpen ? "#166534" : "#1e3a5f"}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 24 }}>{meta.emoji}</span>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{id}</div>
                      <div style={{ fontSize: 10, color: "#475569" }}>{meta.type} {isOpen ? "· 🟢 Ouvert" : "· Halal ✓"}</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "right", minWidth: 90 }}>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{fmt(id, sig?.price)}</div>
                    <div style={{ fontSize: 9, color: "#475569" }}>{sig?.reason || "En attente"}</div>
                  </div>
                  <Badge signal={sig?.signal || "ATTENDRE"} />
                </div>
              );
            })}
          </div>
        )}

        {tab === "positions" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {positions.length === 0 ? (
              <div style={{ background: "#0f172a", borderRadius: 12, padding: 24, textAlign: "center", border: "1px solid #1e3a5f", color: "#475569", fontSize: 13 }}>Aucune position ouverte</div>
            ) : positions.map((pos, i) => {
              const cur = signals[pos.symbol]?.price ?? pos.entry_price;
              const pnlPos = +((cur - pos.entry_price) * pos.qty).toFixed(2);
              const pctPos = +((pnlPos / pos.amount) * 100).toFixed(2);
              return (
                <div key={i} style={{ background: "#0f172a", borderRadius: 12, padding: "14px 16px", border: `1px solid ${pnlPos >= 0 ? "#166534" : "#7f1d1d"}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                    <span style={{ fontWeight: 700 }}>{INSTRUMENT_META[pos.symbol]?.emoji} {pos.name}</span>
                    <span style={{ color: pnlPos >= 0 ? "#34d399" : "#f87171", fontWeight: 800 }}>{pnlPos >= 0 ? "+" : ""}{pnlPos}€ ({pctPos}%)</span>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 6, fontSize: 11 }}>
                    {[["Entree", fmt(pos.symbol, pos.entry_price)], ["Actuel", fmt(pos.symbol, cur)], ["Investi", `${pos.amount}€`], ["TP", fmt(pos.symbol, pos.tp), "#34d399"], ["SL", fmt(pos.symbol, pos.sl), "#f87171"]].map(([l, v, c], j) => (
                      <div key={j} style={{ background: "#1e293b", borderRadius: 6, padding: "5px 8px" }}>
                        <div style={{ color: "#475569", fontSize: 9 }}>{l}</div>
                        <div style={{ color: c || "#e2e8f0", fontWeight: 600, fontSize: 11 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab === "historique" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {trades.length === 0 ? (
              <div style={{ background: "#0f172a", borderRadius: 12, padding: 24, textAlign: "center", border: "1px solid #1e3a5f", color: "#475569", fontSize: 13 }}>Aucun trade cloture</div>
            ) : trades.slice().reverse().map((t, i) => (
              <div key={i} style={{ background: "#0f172a", borderRadius: 10, padding: "12px 14px", border: `1px solid ${t.result === "WIN" ? "#166534" : "#7f1d1d"}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{INSTRUMENT_META[t.symbol]?.emoji} {t.name}</div>
                  <div style={{ fontSize: 10, color: "#475569" }}>{new Date(t.time).toLocaleString("fr-FR")} · {fmt(t.symbol, t.entry_price)} → {fmt(t.symbol, t.exit_price)}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ color: t.gain >= 0 ? "#34d399" : "#f87171", fontWeight: 800, fontSize: 14 }}>{t.gain >= 0 ? "+" : ""}{t.gain}€</div>
                  <div style={{ fontSize: 10, background: t.result === "WIN" ? "#14532d" : "#7f1d1d", color: t.result === "WIN" ? "#86efac" : "#fca5a5", padding: "1px 6px", borderRadius: 8, display: "inline-block" }}>{t.result} · {t.pct}%</div>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{ marginTop: 16, background: "#0f172a", borderRadius: 10, padding: 12, border: "1px solid #1e3a5f", textAlign: "center" }}>
          <div style={{ fontSize: 10, color: "#475569" }}>🌙 Or · Bitcoin Spot · Actions directes · Zero interets · Zero levier · Zero CFD</div>
          <div style={{ fontSize: 10, color: "#334155", marginTop: 3 }}>Phase de test · Capital fictif 1 000€ · Vraies donnees de marche · Aucun argent reel engage</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
