<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HalalBot - Paper Trading</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080d1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const INITIAL_CAPITAL = 1000;

const HALAL_INSTRUMENTS = [
{ id: “XAUUSD”, name: “Or / Gold”, type: “Matière première”, emoji: “🥇” },
{ id: “BTC”, name: “Bitcoin”, type: “Crypto Halal”, emoji: “₿” },
{ id: “NVDA”, name: “Nvidia”, type: “Action Tech”, emoji: “💻” },
{ id: “MSFT”, name: “Microsoft”, type: “Action Tech”, emoji: “🖥️” },
{ id: “AAPL”, name: “Apple”, type: “Action Tech”, emoji: “📱” },
];

const BASE_PRICES = { XAUUSD: 4504, BTC: 77365, NVDA: 185, MSFT: 425, AAPL: 198 };
const VOLATILITIES = { XAUUSD: 8, BTC: 250, NVDA: 1.2, MSFT: 0.8, AAPL: 0.7 };

const generatePrice = (base, vol) => +(base + (Math.random() - 0.48) * vol).toFixed(2);

const analyzeSignal = (price, history) => {
if (history.length < 5) return “ATTENDRE”;
const avg = history.slice(-5).reduce((s, h) => s + h.price, 0) / 5;
const rsi = Math.random() * 40 + 30;
if (price > avg * 1.002 && rsi < 70) return “ACHETER”;
if (price < avg * 0.998 && rsi > 30) return “VENDRE”;
return “ATTENDRE”;
};

const Badge = ({ signal }) => {
const map = { ACHETER: [”#16a34a”, “▲ ACHETER”], VENDRE: [”#dc2626”, “▼ VENDRE”], ATTENDRE: [”#d97706”, “◆ ATTENDRE”] };
const [bg, label] = map[signal];
return <span style={{ background: bg, color: “white”, fontSize: 10, fontWeight: 700, padding: “3px 8px”, borderRadius: 20, whiteSpace: “nowrap” }}>{label}</span>;
};

const Card = ({ label, value, color }) => (

  <div style={{ background: "#0f172a", borderRadius: 10, padding: "10px 8px", textAlign: "center", border: "1px solid #1e3a5f" }}>
    <div style={{ fontSize: 9, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
    <div style={{ fontSize: 14, fontWeight: 800, color }}>{value}</div>
  </div>
);

function App() {
const [capital, setCapital] = useState(INITIAL_CAPITAL);
const [prices, setPrices] = useState({ …BASE_PRICES });
const [history, setHistory] = useState(Object.fromEntries(Object.keys(BASE_PRICES).map(k => [k, []])));
const [positions, setPositions] = useState([]);
const [trades, setTrades] = useState([]);
const [signals, setSignals] = useState({});
const [running, setRunning] = useState(false);
const [tick, setTick] = useState(0);
const [tab, setTab] = useState(“marches”);
const [elapsed, setElapsed] = useState(“00:00:00”);
const [startTime] = useState(Date.now());

useEffect(() => {
if (!running) return;
const t = setInterval(() => {
const d = Math.floor((Date.now() - startTime) / 1000);
setElapsed(`${String(Math.floor(d/3600)).padStart(2,"0")}:${String(Math.floor((d%3600)/60)).padStart(2,"0")}:${String(d%60).padStart(2,"0")}`);
}, 1000);
return () => clearInterval(t);
}, [running]);

useEffect(() => {
if (!running) return;
const t = setInterval(() => {
setPrices(prev => {
const next = {};
Object.keys(prev).forEach(id => { next[id] = generatePrice(prev[id], VOLATILITIES[id]); });
return next;
});
setHistory(prev => {
const next = {};
Object.keys(prev).forEach(id => {
next[id] = […prev[id].slice(-20), { price: prices[id], time: new Date().toLocaleTimeString() }];
});
return next;
});
setTick(t => t + 1);
}, 2000);
return () => clearInterval(t);
}, [running, prices]);

useEffect(() => {
if (!running || tick === 0) return;
const newSignals = {};
HALAL_INSTRUMENTS.forEach(inst => {
const sig = analyzeSignal(prices[inst.id], history[inst.id] || []);
newSignals[inst.id] = sig;
if (sig === “ACHETER”) {
const open = positions.find(p => p.id === inst.id);
if (!open && capital > 100) {
const amount = Math.min(capital * 0.15, 200);
const qty = +(amount / prices[inst.id]).toFixed(6);
const pos = { id: inst.id, name: inst.name, emoji: inst.emoji, entryPrice: prices[inst.id], qty, amount, tp: +(prices[inst.id] * 1.025).toFixed(2), sl: +(prices[inst.id] * 0.988).toFixed(2), openTime: new Date().toLocaleTimeString() };
setPositions(prev => […prev, pos]);
setCapital(prev => +(prev - amount).toFixed(2));
}
}
});
setSignals(newSignals);

```
setPositions(prev => {
  const remaining = [];
  prev.forEach(pos => {
    const cur = prices[pos.id];
    if (cur >= pos.tp || cur <= pos.sl) {
      const gain = +((cur - pos.entryPrice) * pos.qty).toFixed(2);
      setCapital(c => +(c + pos.amount + gain).toFixed(2));
      setTrades(t => [{ id: pos.id, name: pos.name, emoji: pos.emoji, entryPrice: pos.entryPrice, exitPrice: cur, gain, pct: +((gain / pos.amount) * 100).toFixed(2), time: new Date().toLocaleTimeString(), result: gain > 0 ? "WIN" : "LOSS" }, ...t.slice(0, 29)]);
    } else {
      remaining.push({ ...pos, pnl: +((cur - pos.entryPrice) * pos.qty).toFixed(2) });
    }
  });
  return remaining;
});

}, [tick]);

const totalValue = capital + positions.reduce((s, p) => s + p.amount + (prices[p.id] - p.entryPrice) * p.qty, 0);
const pnl = +(totalValue - INITIAL_CAPITAL).toFixed(2);
const pct = +((pnl / INITIAL_CAPITAL) * 100).toFixed(2);
const wins = trades.filter(t => t.result === “WIN”).length;
const winRate = trades.length ? +((wins / trades.length) * 100).toFixed(1) : 0;
const totalGain = +trades.reduce((s, t) => s + t.gain, 0).toFixed(2);

const fmt = (id, price) => {
if (id === “BTC”) return `$${price.toLocaleString()}`;
if (id === “XAUUSD”) return `$${price.toLocaleString()}`;
return `$${price}`;
};

return (
<div style={{ fontFamily: “Inter, sans-serif”, background: “#080d1a”, minHeight: “100vh”, paddingBottom: 40 }}>
{/* Header */}
<div style={{ background: “linear-gradient(135deg,#0f172a,#1a1f3e)”, borderBottom: “1px solid #1e3a5f”, padding: “14px 16px” }}>
<div style={{ maxWidth: 800, margin: “0 auto”, display: “flex”, justifyContent: “space-between”, alignItems: “center” }}>
<div>
<div style={{ display: “flex”, alignItems: “center”, gap: 8 }}>
<span style={{ fontSize: 22 }}>🌙</span>
<span style={{ fontSize: 20, fontWeight: 800, color: “#c9a84c” }}>HalalBot</span>
<span style={{ fontSize: 10, background: “#1e3a5f”, color: “#60a5fa”, padding: “2px 8px”, borderRadius: 10, fontWeight: 600 }}>PAPER TRADING</span>
</div>
<div style={{ fontSize: 11, color: “#475569”, marginTop: 2 }}>Sans intérêts · Sans levier · Sans CFD</div>
</div>
<div style={{ textAlign: “right” }}>
{running && <div style={{ fontSize: 11, color: “#34d399”, marginBottom: 4 }}>● EN COURS · {elapsed}</div>}
<button onClick={() => setRunning(r => !r)} style={{ background: running ? “#7f1d1d” : “#14532d”, color: running ? “#fca5a5” : “#86efac”, border: `1px solid ${running ? "#dc2626" : "#16a34a"}`, borderRadius: 8, padding: “7px 16px”, fontWeight: 700, fontSize: 13, cursor: “pointer” }}>
{running ? “⏸ PAUSE” : “▶ DÉMARRER”}
</button>
</div>
</div>
</div>

```
  <div style={{ maxWidth: 800, margin: "0 auto", padding: "16px" }}>
    {/* Stats */}
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 8 }}>
      <Card label="Capital" value={`${capital.toFixed(0)}€`} color="#60a5fa" />
      <Card label="Total" value={`${totalValue.toFixed(0)}€`} color="#c9a84c" />
      <Card label="P&L" value={`${pnl >= 0 ? "+" : ""}${pnl}€`} color={pnl >= 0 ? "#34d399" : "#f87171"} />
      <Card label="Perf." value={`${pct >= 0 ? "+" : ""}${pct}%`} color={pct >= 0 ? "#34d399" : "#f87171"} />
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 14 }}>
      <Card label="Trades" value={trades.length} color="#e2e8f0" />
      <Card label="Win Rate" value={`${winRate}%`} color="#e2e8f0" />
      <Card label="Gain net" value={`${totalGain >= 0 ? "+" : ""}${totalGain}€`} color={totalGain >= 0 ? "#34d399" : "#f87171"} />
      <Card label="Positions" value={positions.length} color="#e2e8f0" />
    </div>

    {/* Tabs */}
    <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
      {[["marches","Marchés"],["positions",`Positions (${positions.length})`],["historique",`Historique (${trades.length})`]].map(([key, label]) => (
        <button key={key} onClick={() => setTab(key)} style={{ background: tab === key ? "#1e3a5f" : "#0f172a", color: tab === key ? "#60a5fa" : "#475569", border: `1px solid ${tab === key ? "#3b82f6" : "#1e3a5f"}`, borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{label}</button>
      ))}
    </div>

    {/* Marchés */}
    {tab === "marches" && (
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {!running && (
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 20, textAlign: "center", border: "1px dashed #1e3a5f", marginBottom: 8 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🤖</div>
            <div style={{ color: "#94a3b8", fontSize: 13, marginBottom: 4 }}>Bot prêt · Capital fictif 1 000€</div>
            <div style={{ color: "#c9a84c", fontSize: 12 }}>Appuie sur DÉMARRER pour lancer la phase de test</div>
          </div>
        )}
        {HALAL_INSTRUMENTS.map(inst => {
          const price = prices[inst.id];
          const hist = history[inst.id] || [];
          const prev = hist.length > 1 ? hist[hist.length - 2]?.price : price;
          const change = prev ? +(((price - prev) / prev) * 100).toFixed(3) : 0;
          const sig = signals[inst.id] || "ATTENDRE";
          const isOpen = positions.find(p => p.id === inst.id);
          return (
            <div key={inst.id} style={{ background: "#0f172a", borderRadius: 12, padding: "14px 16px", border: `1px solid ${isOpen ? "#166534" : "#1e3a5f"}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 24 }}>{inst.emoji}</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{inst.name}</div>
                  <div style={{ fontSize: 10, color: "#475569" }}>{inst.type} {isOpen ? "· 🟢 Ouvert" : "· Halal ✓"}</div>
                </div>
              </div>
              <div style={{ textAlign: "right", minWidth: 90 }}>
                <div style={{ fontWeight: 700, fontSize: 13 }}>{fmt(inst.id, price)}</div>
                <div style={{ fontSize: 10, color: change >= 0 ? "#34d399" : "#f87171" }}>{change >= 0 ? "▲" : "▼"} {Math.abs(change)}%</div>
              </div>
              <Badge signal={sig} />
            </div>
          );
        })}
      </div>
    )}

    {/* Positions */}
    {tab === "positions" && (
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {positions.length === 0 ? (
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 24, textAlign: "center", border: "1px solid #1e3a5f", color: "#475569", fontSize: 13 }}>Aucune position ouverte</div>
        ) : positions.map((pos, i) => {
          const cur = prices[pos.id];
          const pnl = +((cur - pos.entryPrice) * pos.qty).toFixed(2);
          const pct = +((pnl / pos.amount) * 100).toFixed(2);
          return (
            <div key={i} style={{ background: "#0f172a", borderRadius: 12, padding: "14px 16px", border: `1px solid ${pnl >= 0 ? "#166534" : "#7f1d1d"}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 20 }}>{pos.emoji}</span>
                  <span style={{ fontWeight: 700 }}>{pos.name}</span>
                </div>
                <span style={{ color: pnl >= 0 ? "#34d399" : "#f87171", fontWeight: 800 }}>{pnl >= 0 ? "+" : ""}{pnl}€ ({pct}%)</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 6, fontSize: 11 }}>
                {[["Entrée", fmt(pos.id, pos.entryPrice)], ["Actuel", fmt(pos.id, cur)], ["Investi", `${pos.amount}€`], ["TP", fmt(pos.id, pos.tp), "#34d399"], ["SL", fmt(pos.id, pos.sl), "#f87171"], ["Ouvert", pos.openTime]].map(([l, v, c], j) => (
                  <div key={j} style={{ background: "#1e293b", borderRadius: 6, padding: "5px 8px" }}>
                    <div style={{ color: "#475569", fontSize: 9 }}>{l}</div>
                    <div style={{ color: c || "#e2e8f0", fontWeight: 600, fontSize: 11 }}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    )}

    {/* Historique */}
    {tab === "historique" && (
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {trades.length === 0 ? (
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 24, textAlign: "center", border: "1px solid #1e3a5f", color: "#475569", fontSize: 13 }}>Aucun trade clôturé</div>
        ) : trades.map((t, i) => (
          <div key={i} style={{ background: "#0f172a", borderRadius: 10, padding: "12px 14px", border: `1px solid ${t.result === "WIN" ? "#166534" : "#7f1d1d"}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 18 }}>{t.emoji}</span>
              <div>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{t.name}</div>
                <div style={{ fontSize: 10, color: "#475569" }}>{t.time} · {fmt(t.id, t.entryPrice)} → {fmt(t.id, t.exitPrice)}</div>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ color: t.gain >= 0 ? "#34d399" : "#f87171", fontWeight: 800, fontSize: 14 }}>{t.gain >= 0 ? "+" : ""}{t.gain}€</div>
              <div style={{ fontSize: 10, background: t.result === "WIN" ? "#14532d" : "#7f1d1d", color: t.result === "WIN" ? "#86efac" : "#fca5a5", padding: "1px 6px", borderRadius: 8, display: "inline-block" }}>{t.result} · {t.pct}%</div>
            </div>
          </div>
        ))}
      </div>
    )}

    <div style={{ marginTop: 16, background: "#0f172a", borderRadius: 10, padding: 12, border: "1px solid #1e3a5f", textAlign: "center" }}>
      <div style={{ fontSize: 10, color: "#475569" }}>🌙 Or · Bitcoin Spot · Actions directes · Zéro intérêts · Zéro levier · Zéro CFD</div>
      <div style={{ fontSize: 10, color: "#334155", marginTop: 3 }}>Phase de test · Capital fictif 1 000€ · Aucun argent réel engagé</div>
    </div>
  </div>
</div>

}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>
